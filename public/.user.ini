; PHP runtime settings for Hostinger shared hosting (PHP-FPM).
; Place this file in the same directory as index.php (i.e. public_html/).
; Changes take effect within a few minutes without a server restart.

upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
max_input_time = 300
memory_limit = 256M
